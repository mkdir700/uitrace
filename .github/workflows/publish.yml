name: Publish to PyPI

on:
  push:
    tags:
      - "v*"

concurrency:
  group: publish-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: macos-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version-file: .python-version

      - name: Setup uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Verify tag matches pyproject.toml version
        shell: bash
        run: |
          set -euo pipefail
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          PYPROJECT_VERSION="$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")"
          if [[ "$TAG_VERSION" != "$PYPROJECT_VERSION" ]]; then
            echo "::error::Tag version v${TAG_VERSION} does not match pyproject.toml version ${PYPROJECT_VERSION}"
            exit 1
          fi

      - name: Sync
        run: uv sync --group dev --frozen

      - name: Ruff
        run: uv run ruff check . --output-format github

      - name: Mypy
        run: uv run mypy src

      - name: Pytest
        run: uv run pytest -q

      - name: Build (sdist+wheel)
        run: uv build --no-sources

      - name: Smoke test wheel
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          wheels=(dist/*.whl)
          if [ ${#wheels[@]} -ne 1 ]; then
            echo "Expected exactly 1 wheel in dist/, found: ${wheels[*]}"
            exit 1
          fi
          uvx --from "${wheels[0]}" uitrace --help
          uvx --from "${wheels[0]}" uitrace play --dry-run tests/fixtures/trace_v1_valid.jsonl

      - name: Upload dists
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/
          if-no-files-found: error

  publish:
    runs-on: macos-latest
    needs: build
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Download dists
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Publish
        run: uv publish --trusted-publishing always dist/*
